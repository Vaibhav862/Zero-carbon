version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: zero-carbon-mongodb
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: zero-carbon-redis
    restart: always
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    container_name: zero-carbon-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/zerocarbon
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=supersecretjwtkeyforzerocarbononeappdev
      - JWT_REFRESH_SECRET=supersecretjwtrefreshkeyforzerocarbononeappdev
      - UPLOAD_DIR=./uploads
      - MAX_FILE_SIZE_MB=20
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      - mongodb
      - redis
    volumes:
      - backend_uploads:/usr/src/app/uploads

  worker:
    build: ./backend
    container_name: zero-carbon-worker
    command: npm run worker
    restart: always
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/zerocarbon
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - UPLOAD_DIR=./uploads
    depends_on:
      - mongodb
      - redis
      - backend
    volumes:
      - backend_uploads:/usr/src/app/uploads

  frontend:
    build: ./frontend
    container_name: zero-carbon-frontend
    restart: always
    ports:
      - '3000:80'
    depends_on:
      - backend

volumes:
  mongodb_data:
  backend_uploads:
